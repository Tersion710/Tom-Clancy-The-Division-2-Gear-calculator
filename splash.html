<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080c10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .emblem {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f4a21e 0%, #c07010 100%);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px #f4a21e44; }
      50%       { box-shadow: 0 0 40px #f4a21e88; }
    }

    .emblem svg {
      width: 44px;
      height: 44px;
      fill: #080c10;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #f4a21e;
      text-shadow: 0 0 30px #f4a21e66;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #4a6070;
      margin-bottom: 32px;
    }

    .divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #f4a21e88, transparent);
      margin-bottom: 32px;
    }

    .author {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #b8cfe0;
      margin-bottom: 8px;
    }

    .clan {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4a6070;
    }

    .loading-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, #f4a21e, #00e5ff);
      animation: load 2.2s ease forwards;
      width: 0%;
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="emblem">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 7v5c0 5.25 4.25 10.15 10 11.35C17.75 22.15 22 17.25 22 12V7L12 2zm0 2.18l8 4.37V12c0 4.34-3.46 8.4-8 9.56C7.46 20.4 4 16.34 4 12V8.55l8-4.37zM11 7v2H9v2h2v2H9v2h2v2h2v-2h2v-2h-2v-2h2V9h-2V7h-2z"/>
    </svg>
  </div>

  <div class="title">Division 2</div>
  <div class="subtitle">Gear &amp; DPS Calculator v1.5</div>

  <div class="divider"></div>

  <div class="author">ImThatTeriyaki</div>
  <div class="clan">Sleepy Inc Clan</div>

  <div class="loading-bar"></div>
</body>
</html>
