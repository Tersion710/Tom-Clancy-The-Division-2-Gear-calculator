<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #dot-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Corner brackets */
    .corner { position: fixed; width: 40px; height: 40px; z-index: 2; }
    .corner.tl { top:20px; left:20px;  border-top:1px solid rgba(244,162,30,0.55); border-left:1px solid rgba(244,162,30,0.55); }
    .corner.tr { top:20px; right:20px; border-top:1px solid rgba(244,162,30,0.55); border-right:1px solid rgba(244,162,30,0.55); }
    .corner.bl { bottom:20px; left:20px;  border-bottom:1px solid rgba(244,162,30,0.55); border-left:1px solid rgba(244,162,30,0.55); }
    .corner.br { bottom:20px; right:20px; border-bottom:1px solid rgba(244,162,30,0.55); border-right:1px solid rgba(244,162,30,0.55); }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .badge {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(244,162,30,0.92), rgba(192,112,16,0.92));
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      animation: badgePulse 2s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%,100% { filter: drop-shadow(0 0 10px rgba(244,162,30,0.50)); }
      50%      { filter: drop-shadow(0 0 24px rgba(244,162,30,0.85)); }
    }
    .badge svg { width: 34px; height: 34px; fill: #050810; }

    .welcome-line {
      font-size: 0.7rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(0,229,255,0.85);
      text-shadow: 0 0 12px rgba(0,229,255,0.55);
      margin-bottom: 10px;
      overflow: hidden; white-space: nowrap; width: 0;
      animation: typeIn 0.6s steps(14,end) 0.5s forwards;
    }
    @keyframes typeIn { to { width: 14ch; } }

    .agent-label {
      font-size: 2.4rem; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: #ffffff;
      text-shadow: 0 0 30px rgba(244,162,30,0.55), 0 0 60px rgba(244,162,30,0.20);
      margin-bottom: 6px;
      opacity: 0; animation: fadeIn 0.5s ease 1.1s forwards;
    }

    .codename {
      font-size: 0.72rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: rgba(255,255,255,0.38); margin-bottom: 40px;
      opacity: 0; animation: fadeIn 0.5s ease 1.4s forwards;
    }

    .power-wrap {
      width: 320px; height: 2px;
      background: rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
      opacity: 0; animation: fadeIn 0.3s ease 1.6s forwards;
    }
    .power-bar {
      position: absolute; left: 0; top: 0; height: 100%;
      background: linear-gradient(90deg, rgba(244,162,30,0.85), rgba(0,229,255,0.85));
      box-shadow: 0 0 8px rgba(244,162,30,0.50);
      width: 0%; animation: powerOn 1.2s ease 1.8s forwards;
    }
    @keyframes powerOn { to { width: 100%; } }

    .power-label {
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.30); margin-top: 10px;
      opacity: 0; animation: fadeIn 0.3s ease 1.8s forwards;
    }

    .status {
      position: fixed; bottom: 28px; z-index: 2;
      font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(0,230,118,0.80);
      text-shadow: 0 0 8px rgba(0,230,118,0.50);
      opacity: 0; animation: fadeIn 0.4s ease 2s forwards;
    }
    .status::before { content: '● '; }
  </style>
</head>
<body>
  <canvas id="dot-canvas"></canvas>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="badge">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v5c0 5.25 4.25 10.15 10 11.35C17.75 22.15 22 17.25 22 12V7L12 2zm0 2.18l8 4.37V12c0 4.34-3.46 8.4-8 9.56C7.46 20.4 4 16.34 4 12V8.55l8-4.37zM11 7v2H9v2h2v2H9v2h2v2h2v-2h2v-2h-2v-2h2V9h-2V7h-2z"/></svg>
    </div>
    <div class="welcome-line">Welcome Agent</div>
    <div class="agent-label">Division 2</div>
    <div class="codename">SHD Network — Gear &amp; DPS Calculator</div>
    <div class="power-wrap"><div class="power-bar"></div></div>
    <div class="power-label">Initializing systems...</div>
  </div>

  <div class="status">SHD Network Active</div>

  <script>
    const canvas = document.getElementById('dot-canvas');
    const ctx = canvas.getContext('2d');

    const ANGLE_RAD = 20 * Math.PI / 180;
    const SPEED = 0.055; // half of previous 0.11
    const dx = Math.sin(ANGLE_RAD) * SPEED;
    const dy = -Math.cos(ANGLE_RAD) * SPEED;

    let W, H, dots;

    function makeDot(x, y) {
      const depth = Math.random();
      return {
        x: x ?? Math.random() * W,
        y: y ?? Math.random() * H,
        size:  0.8 + depth * 2.4,
        alpha: 0.22 + depth * 0.68,
        glow:  (0.8 + depth * 2.4) * (3 + depth * 7)
      };
    }

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      dots = [];
      const count = Math.floor((W * H) / 28000); // ~60% fewer dots
      for (let i = 0; i < count; i++) dots.push(makeDot());
    }

    function frame() {
      ctx.clearRect(0, 0, W, H);
      for (const d of dots) {
        d.x += dx;
        d.y += dy;
        if (d.y + d.glow < 0)  { d.y = H + d.glow; d.x = Math.random() * W; }
        if (d.x - d.glow > W)  { d.x = -d.glow;    d.y = Math.random() * H; }

        // Sharp core
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(244,162,30,${d.alpha})`;
        ctx.fill();

        // Bokeh halo
        const g = ctx.createRadialGradient(d.x, d.y, d.size * 0.4, d.x, d.y, d.glow);
        g.addColorStop(0,   `rgba(244,162,30,${d.alpha * 0.38})`);
        g.addColorStop(0.4, `rgba(244,162,30,${d.alpha * 0.12})`);
        g.addColorStop(1,   'rgba(244,162,30,0)');
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.glow, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
      }
      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', resize);
    resize();
    frame();
  </script>
</body>
</html>
